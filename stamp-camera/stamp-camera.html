<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>スタンプカメラ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111318;
    --surface: #1c1f26;
    --border: #2e3340;
    --accent: #ff6fa8;
    --accent2: #d94f87;
    --text: #f0eef5;
    --muted: #7a7d8a;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }

  #app {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    /* dvh対応：iOS SafariのURL/タブバーを除いた実際の高さ */
    height: 100dvh;
    background: #000;
    overflow: hidden;
  }

  /* ── カメラ映像：全画面背景 ── */
  #video-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    z-index: 0;
  }

  /* CSS object-fit:cover で全画面に広げる */
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    /* iOSフロントカメラの左右反転はJS側で対応 */
    display: block;
    pointer-events: none;
  }

  /* ── スタンプ（映像の上、ただしUIより下） ── */
  #stamp-container {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 3;  /* パレット(10)・コントロール(11)より下 */
  }

  /* ── フラッシュ ── */
  #flash {
    position: absolute; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none; z-index: 90; /* モーダル(100)の直前 */
    transition: opacity 0.05s;
  }
  #flash.pop { opacity: 0.88; }

  /* ── 未起動プレースホルダー ── */
  #placeholder {
    position: absolute; inset: 0; background: #06070a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; z-index: 20;
  }
  #placeholder.hidden { display: none; }
  #placeholder p { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
  #start-btn {
    background: var(--accent2); color: #fff;
    border: none; font-family: inherit; font-size: 13px;
    font-weight: 700; letter-spacing: 0.1em;
    padding: 11px 26px; border-radius: 40px;
    cursor: pointer; transition: all 0.15s;
  }
  #start-btn:hover { background: var(--accent); transform: scale(1.03); }

  /* ── ヒント ── */
  #hint {
    position: absolute;
    /* パレット（~80px）+ コントロール（~90px）の上に出す */
    bottom: 185px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.6);
    font-size: 11px; padding: 5px 14px;
    border-radius: 14px; letter-spacing: 0.04em;
    pointer-events: none; z-index: 12;
    white-space: nowrap; opacity: 1;
    transition: opacity 0.5s;
  }
  #hint.hidden { opacity: 0; }

  /* ── スタンプパレット（下部オーバーレイ） ── */
  #palette {
    position: absolute; bottom: 90px; left: 0; right: 0;
    background: rgba(28,31,38,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 12px 8px;
    z-index: 10;
  }
  #palette-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.12em; margin-bottom: 8px;
    text-transform: uppercase;
  }
  #palette-items {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  #palette-items::-webkit-scrollbar { display: none; }

  .palette-item {
    flex-shrink: 0;
    width: 50px; height: 50px;
    background: rgba(0,0,0,0.4);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
    padding: 5px;
  }
  .palette-item img {
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  .palette-item:hover { border-color: var(--accent); transform: scale(1.08); }
  .palette-item:active { transform: scale(0.95); }

  /* ── コントロールバー（最下部オーバーレイ） ── */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(28,31,38,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 24px 28px;
    display: flex; align-items: center;
    justify-content: space-between;
    z-index: 11; gap: 12px;
  }

  /* 個別スタンプ */
  .stamp {
    position: absolute;
    cursor: grab;
    pointer-events: auto;
    touch-action: none;
    transform-origin: center center;
    will-change: transform;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    transition: filter 0.15s;
  }
  .stamp.active {
    cursor: grabbing;
    filter: drop-shadow(0 4px 16px rgba(255,111,168,0.5));
    z-index: 10 !important;
  }
  .stamp img { display: block; pointer-events: none; max-width: none; background: transparent; }

  /* 選択中インジケーター */
  .stamp.selected::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px dashed rgba(255,111,168,0.7);
    border-radius: 4px;
    pointer-events: none;
  }

  /* 削除ボタン（選択中スタンプの右上） */
  .stamp-del {
    position: absolute;
    top: -12px; right: -12px;
    width: 26px; height: 26px;
    background: #e53;
    border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: auto !important;
    font-size: 15px; color: white; line-height: 1;
    z-index: 999;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    font-weight: bold;
  }
  .stamp.selected .stamp-del { display: flex; }

  .ctrl-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; flex-shrink: 0;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn:active { transform: scale(0.92); }

  #shutter {
    width: 68px; height: 68px; border-radius: 50%;
    background: #f0f0f8; border: 3px solid var(--accent);
    cursor: pointer; position: relative; flex-shrink: 0;
    box-shadow: 0 0 0 4px rgba(255,111,168,0.18);
    transition: all 0.12s;
  }
  #shutter::after {
    content: ''; position: absolute; inset: 4px;
    border-radius: 50%; background: #f0f0f8; border: 2px solid #ccc;
  }
  #shutter:hover { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(255,111,168,0.22); }
  #shutter:active { transform: scale(0.93); }
  #shutter:disabled { opacity: 0.35; cursor: default; transform: none; }

  #thumb-wrap {
    width: 48px; height: 48px; border-radius: 8px;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    overflow: hidden; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  #thumb-wrap.has { border-color: var(--accent); }
  #thumb-img { width: 100%; height: 100%; object-fit: cover; display: none; }
  #thumb-wrap.has #thumb-img { display: block; }

  #flip-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; flex-shrink: 0;
  }
  #flip-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── モーダル ── */
  #modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  #modal-bg.open { opacity: 1; pointer-events: all; }
  #modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 14px;
    transform: translateY(24px); transition: transform 0.25s;
  }
  #modal-bg.open #modal { transform: translateY(0); }
  #modal-photo { width: 100%; border-radius: 10px; display: block; }
  #modal-actions { display: flex; gap: 10px; }
  .m-btn {
    flex: 1; padding: 11px; border-radius: 10px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s;
  }
  .m-btn.save { background: var(--accent2); color: #fff; }
  .m-btn.save:hover { background: var(--accent); }
  .m-btn.close-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .m-btn.close-btn:hover { border-color: #da3633; color: #da3633; }

  #canvas { display: none; }
  #toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,111,168,0.15); border: 1px solid var(--accent);
    color: var(--accent); font-size: 12px; padding: 7px 16px;
    border-radius: 20px; letter-spacing: 0.08em;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    z-index: 50; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  #stamp-upload-input, #custom-stamp-input { display: none; }
</style>
</head>

<script>
const video         = document.getElementById('video');
const stampContainer= document.getElementById('stamp-container');
const placeholder   = document.getElementById('placeholder');
const flash         = document.getElementById('flash');
const hint          = document.getElementById('hint');
const shutter       = document.getElementById('shutter');
const flipBtn       = document.getElementById('flip-btn');
const clearBtn      = document.getElementById('clear-btn');
const undoBtn       = document.getElementById('undo-btn');
const thumbWrap     = document.getElementById('thumb-wrap');
const thumbImg      = document.getElementById('thumb-img');
const canvas        = document.getElementById('canvas');
const modalBg       = document.getElementById('modal-bg');
const modalPhoto    = document.getElementById('modal-photo');
const modalClose    = document.getElementById('modal-close');
const modalSave     = document.getElementById('modal-save');
const toastEl       = document.getElementById('toast');

let stream = null;
let facingMode = 'user';
let lastPhoto = null;
let selectedStamp = null;
let stampZIndex = 10;
let stamps = []; // {el, emoji, imgSrc, x, y, scale, rot}


// cropState: capturePhoto が使う「映像のどこを切り出すか」の情報
let cropState = null;
let videoRotated = false;

function applyVideoCover() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  // フロントカメラはCSS で左右反転表示
  video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : '';

  const cw = window.innerWidth;
  const ch = window.innerHeight;

  const isMobile = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
  videoRotated = isMobile && (vw > vh);

  let srcVW = vw, srcVH = vh;
  if (videoRotated) [srcVW, srcVH] = [vh, vw];

  const videoAspect = srcVW / srcVH;
  const screenAspect = cw / ch;

  let srcW, srcH, srcX, srcY;
  if (videoAspect > screenAspect) {
    srcH = srcVH;
    srcW = srcH * screenAspect;
    srcX = (srcVW - srcW) / 2;
    srcY = 0;
  } else {
    srcW = srcVW;
    srcH = srcW / screenAspect;
    srcX = 0;
    srcY = (srcVH - srcH) / 2;
  }

  cropState = {
    srcX, srcY, srcW, srcH,
    dispW: cw, dispH: ch,
    rotated: videoRotated,
  };
}

// 映像サイズ確定時・画面リサイズ時にcropStateを更新
video.addEventListener('loadedmetadata', applyVideoCover);
video.addEventListener('resize', applyVideoCover);
window.addEventListener('resize', applyVideoCover);

document.getElementById('start-btn').addEventListener('click', startCamera);
async function startCamera(mode) {
  if (typeof mode !== 'string') mode = facingMode;
  facingMode = mode;
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    const isMobile = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
    const constraints = isMobile
      ? {
          facingMode: mode,
          aspectRatio: { ideal: 9 / 16 },
          width:  { min: 640, ideal: 1920, max: 3840 },
          height: { min: 1280, ideal: 1080, max: 2160 },
          advanced: [{ zoom: 1.0 }]
        }
      : {
          facingMode: mode,
          width:  { ideal: 1920 },
          height: { ideal: 1080 }
        };
    stream = await navigator.mediaDevices.getUserMedia({ video: constraints, audio: false });
    video.srcObject = stream;

    // ズーム対応機種はズームを最小に設定
    try {
      const track = stream.getVideoTracks()[0];
      const caps  = track.getCapabilities();
      if (caps.zoom) {
        await track.applyConstraints({ advanced: [{ zoom: caps.zoom.min }] });
      }
    } catch(e) { /* ズーム非対応機種は無視 */ }

    placeholder.classList.add('hidden');
    shutter.disabled = false;
    showToast('カメラ起動しました');
  } catch(e) {
    showToast('カメラにアクセスできません');
    console.error(e);
  }
}

// ── カメラ切替 ──
flipBtn.addEventListener('click', () => {
  if (!stream) return;
  const next = facingMode === 'user' ? 'environment' : 'user';
  startCamera(next);
  flipBtn.style.transition = 'transform 0.4s';
  flipBtn.style.transform = 'rotate(180deg)';
  setTimeout(() => { flipBtn.style.transform = ''; }, 420);
});

// ── スタンプパレット：画像スタンプ ──
document.querySelectorAll('.palette-item[data-stamp]').forEach(item => {
  item.addEventListener('click', () => {
    addImageStamp(item.dataset.stamp);
  });
});

// ── スタンプを追加（画像ファイル） ──
function addImageStamp(src) {
  const vw = stampContainer.clientWidth;
  const vh = stampContainer.clientHeight;
  createStamp(src, vw / 2, vh / 2, 1, null);
  showToast('スタンプを追加しました');
  showHintBriefly();
}

// ── スタンプDOM生成 ──
function createStamp(imgSrc, cx, cy, initScale, emoji) {
  const el = document.createElement('div');
  el.className = 'stamp';
  el.style.zIndex = ++stampZIndex;

  const img = document.createElement('img');
  img.src = imgSrc;
  img.style.width = '120px';
  img.style.height = '120px';
  img.style.objectFit = 'contain';
  img.style.background = 'transparent';
  img.style.display = 'block';
  el.appendChild(img);

  // 削除ボタン
  const del = document.createElement('div');
  del.className = 'stamp-del';
  del.textContent = '×';
  del.addEventListener('click', e => {
    e.stopPropagation();
    removeStamp(el);
  });
  el.appendChild(del);

  // 状態
  const state = { el, imgSrc, emoji, x: cx, y: cy, scale: initScale, rot: 0 };
  stamps.push(state);

  applyStampTransform(state);

  // イベント
  attachStampEvents(el, state);

  stampContainer.appendChild(el);
  selectStamp(el, state);
  return state;
}

function applyStampTransform(state) {
  state.el.style.left = '0px';
  state.el.style.top  = '0px';
  state.el.style.transform = `translate(${state.x - 60}px, ${state.y - 60}px) scale(${state.scale})`;
}

function removeStamp(el) {
  stamps = stamps.filter(s => s.el !== el);
  el.remove();
  selectedStamp = null;
}

function selectStamp(el, state) {
  // 全選択解除
  document.querySelectorAll('.stamp.selected').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  el.style.zIndex = ++stampZIndex;
  selectedStamp = state;
}

// 背景タップで選択解除
stampContainer.addEventListener('pointerdown', e => {
  if (e.target === stampContainer || e.target === video) {
    document.querySelectorAll('.stamp.selected').forEach(s => s.classList.remove('selected'));
    selectedStamp = null;
  }
});

// ── スタンプのドラッグ＆ピンチ（シンプル・確実な実装） ──
function attachStampEvents(el, state) {
  // pointerId → 開始時のクライアント座標
  const ptrs = {};

  // ドラッグ開始時のスタンプ位置とポインター位置（1本指用）
  let drag1 = null; // { startX, startY, startStampX, startStampY }

  // ピンチ開始時の状態（2本指用）
  let pinch = null; // { dist, startScale, midX, midY, startStampX, startStampY }

  el.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('stamp-del')) return; // 削除ボタンは除外
    e.preventDefault();
    e.stopPropagation();
    el.setPointerCapture(e.pointerId);

    ptrs[e.pointerId] = { x: e.clientX, y: e.clientY };
    selectStamp(el, state);
    el.classList.add('active');

    const ids = Object.keys(ptrs);
    if (ids.length === 1) {
      // 1本指ドラッグ開始
      drag1 = {
        startClientX: e.clientX,
        startClientY: e.clientY,
        startStampX: state.x,
        startStampY: state.y
      };
      pinch = null;
    } else if (ids.length === 2) {
      // 2本指ピンチ開始
      const a = ptrs[ids[0]], b = ptrs[ids[1]];
      pinch = {
        dist: Math.hypot(b.x - a.x, b.y - a.y),
        startScale: state.scale,
        midX: (a.x + b.x) / 2,
        midY: (a.y + b.y) / 2,
        startStampX: state.x,
        startStampY: state.y
      };
      drag1 = null;
    }
  });

  el.addEventListener('pointermove', e => {
    if (!(e.pointerId in ptrs)) return;
    e.preventDefault();
    ptrs[e.pointerId] = { x: e.clientX, y: e.clientY };

    const ids = Object.keys(ptrs);
    const rect = stampContainer.getBoundingClientRect();
    // stampContainerの表示スケール比（CSS transformで縮小されている場合の補正）
    const scX = stampContainer.offsetWidth  / rect.width;
    const scY = stampContainer.offsetHeight / rect.height;

    if (ids.length === 1 && drag1) {
      // 1本指：ドラッグ
      const dx = (e.clientX - drag1.startClientX) * scX;
      const dy = (e.clientY - drag1.startClientY) * scY;
      state.x = drag1.startStampX + dx;
      state.y = drag1.startStampY + dy;
      applyStampTransform(state);

    } else if (ids.length >= 2 && pinch) {
      // 2本指：ピンチ＋パン
      const a = ptrs[ids[0]], b = ptrs[ids[1]];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      state.scale = Math.min(5, Math.max(0.15, pinch.startScale * (dist / pinch.dist)));

      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2;
      state.x = pinch.startStampX + (midX - pinch.midX) * scX;
      state.y = pinch.startStampY + (midY - pinch.midY) * scY;
      applyStampTransform(state);
    }
  });

  const onEnd = e => {
    delete ptrs[e.pointerId];
    const ids = Object.keys(ptrs);
    el.classList.remove('active');

    if (ids.length === 0) {
      drag1 = null;
      pinch = null;
    } else if (ids.length === 1) {
      // 指が1本になったらドラッグに切り替え
      const remaining = ptrs[ids[0]];
      drag1 = {
        startClientX: remaining.x,
        startClientY: remaining.y,
        startStampX: state.x,
        startStampY: state.y
      };
      pinch = null;
      el.classList.add('active');
    }
  };

  el.addEventListener('pointerup',     onEnd);
  el.addEventListener('pointercancel', onEnd);
}

// ── 全消去 ──
clearBtn.addEventListener('click', () => {
  stampContainer.innerHTML = '';
  stamps = [];
  selectedStamp = null;
  showToast('スタンプを全消去しました');
});

// ── アンドゥ（最後のスタンプを削除） ──
undoBtn.addEventListener('click', () => {
  if (stamps.length === 0) return;
  const last = stamps[stamps.length - 1];
  removeStamp(last.el);
  showToast('元に戻しました');
});

// ── シャッター ──
shutter.addEventListener('click', () => {
  // 選択状態を一時解除して撮影
  document.querySelectorAll('.stamp.selected').forEach(s => s.classList.remove('selected'));
  doFlash();
  setTimeout(capturePhoto, 100);
});

function doFlash() {
  flash.classList.add('pop');
  setTimeout(() => flash.classList.remove('pop'), 160);
}

function capturePhoto() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh)   { showToast('カメラが準備中です'); return; }
  if (!cropState)   { showToast('カメラが準備中です'); return; }

  const { srcX, srcY, srcW, srcH, dispW, dispH, rotated } = cropState;
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  canvas.width  = Math.round(dispW * dpr);
  canvas.height = Math.round(dispH * dpr);
  const ctx = canvas.getContext('2d');

  if (rotated) {
    // 横長映像を90度回転して描画
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(Math.PI / 2);
    // 回転後: canvas の width/height が入れ替わった状態で描画
    ctx.drawImage(video,
      srcY, srcX, srcH, srcW,   // 回転時は x↔y, w↔h を入れ替え
      -canvas.height / 2, -canvas.width / 2, canvas.height, canvas.width);
    ctx.restore();
  } else if (facingMode === 'user') {
    // フロントカメラ：左右反転
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video,
      vw - srcX - srcW, srcY, srcW, srcH,
      0, 0, canvas.width, canvas.height);
    ctx.restore();
  } else {
    ctx.drawImage(video,
      srcX, srcY, srcW, srcH,
      0, 0, canvas.width, canvas.height);
  }

  // スタンプ描画
  const scaleX = canvas.width  / dispW;
  const scaleY = canvas.height / dispH;
  const sorted = [...stamps].sort((a, b) =>
    parseInt(a.el.style.zIndex) - parseInt(b.el.style.zIndex)
  );
  let pending = sorted.length;
  if (pending === 0) { finalize(); return; }

  sorted.forEach(state => {
    const img = new Image();
    img.onload = () => {
      const cx = state.x * scaleX;
      const cy = state.y * scaleY;
      const sw = 120 * state.scale * scaleX;
      const sh = 120 * state.scale * scaleY;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.drawImage(img, -sw / 2, -sh / 2, sw, sh);
      ctx.restore();
      pending--;
      if (pending === 0) finalize();
    };
    img.onerror = () => { pending--; if (pending === 0) finalize(); };
    img.src = state.imgSrc;
  });

  function finalize() {
    lastPhoto = canvas.toDataURL('image/jpeg', 0.93);
    thumbImg.src = lastPhoto;
    thumbWrap.classList.add('has');
    modalPhoto.src = lastPhoto;
    modalBg.classList.add('open');
  }
}

// ── 保存 ──
modalSave.addEventListener('click', async () => {
  if (!lastPhoto) return;

  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = `stamp-photo-${ts}.jpg`;

  const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid = /android/i.test(navigator.userAgent);

  // ── iOS Safari：Web Share API → 「画像を保存」でカメラロールへ ──
  if (isIOS && navigator.canShare) {
    try {
      const res  = await fetch(lastPhoto);
      const blob = await res.blob();
      const file = new File([blob], filename, { type: 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        showToast('カメラロールに保存できます！');
        modalBg.classList.remove('open');
        return;
      }
    } catch(e) {
      if (e.name === 'AbortError') return; // ユーザーがキャンセル
    }
  }

  // ── Android Chrome：ダウンロード → ギャラリーに自動追加 ──
  // ── PC：通常ダウンロード ──
  const a = document.createElement('a');
  a.download = filename;
  a.href = lastPhoto;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  if (isAndroid) {
    showToast('ギャラリーの「ダウンロード」に保存されました！');
  } else {
    showToast('保存しました！');
  }
  modalBg.classList.remove('open');
});
modalClose.addEventListener('click', () => modalBg.classList.remove('open'));
modalBg.addEventListener('click', e => { if (e.target === modalBg) modalBg.classList.remove('open'); });
thumbWrap.addEventListener('click', () => {
  if (!lastPhoto) return;
  modalPhoto.src = lastPhoto;
  modalBg.classList.add('open');
});

// ── ヒント ──
let hintTimer;
function showHintBriefly() {
  hint.classList.remove('hidden');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => hint.classList.add('hidden'), 3500);
}

// ── トースト ──
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

// ── 保存ボタンのラベルを端末に合わせて変更 ──
const _isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
const _isAndroid = /android/i.test(navigator.userAgent);
document.getElementById('modal-save').textContent =
  _isIOS     ? '📷 カメラロールに保存' :
  _isAndroid ? '📥 ギャラリーに保存' :
               '💾 保存 (JPEG)';

// ── キーボード ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !shutter.disabled) { e.preventDefault(); shutter.click(); }
  if (e.code === 'Delete' || e.code === 'Backspace') {
    if (selectedStamp) { removeStamp(selectedStamp.el); }
  }
});

// ── 自動起動（HTTPS環境では許可ダイアログが出た後に起動） ──
startCamera();
</script>
